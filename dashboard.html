<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AyosPH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-page">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-logo">
                <i class="ph ph-house-line"></i>
                <span>AyosPH</span>
            </a>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item active">
                <i class="ph ph-squares-four"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="menu-item" data-view="my-reports">
                <i class="ph ph-file-text"></i>
                <span>My Reports</span>
            </a>
            <a href="#" class="menu-item" data-view="new-report">
                <i class="ph ph-plus-circle"></i>
                <span>New Report</span>
            </a>
            <a href="#" class="menu-item" data-view="notifications">
                <i class="ph ph-bell"></i>
                <span>Notifications</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile" id="userProfile">
                <div class="user-avatar" id="userAvatar">JD</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-role" id="userRole">Resident</div>
                </div>
                <i class="ph ph-sign-out" id="logoutBtn" style="color: var(--gray-400);"></i>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="ph ph-list"></i>
                </button>
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
            </div>
            <div class="top-bar-right">
                <button class="notification-btn" id="notificationBtn">
                    <i class="ph ph-bell"></i>
                    <span class="notification-badge hidden" id="notificationBadge"></span>
                </button>
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-value" id="totalReports">0</div>
                            <div class="stat-card-label">Total Reports</div>
                        </div>
                        <div class="stat-card-icon primary">
                            <i class="ph ph-file-text"></i>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-value" id="pendingReports">0</div>
                            <div class="stat-card-label">Pending</div>
                        </div>
                        <div class="stat-card-icon warning">
                            <i class="ph ph-clock"></i>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-value" id="inProgressReports">0</div>
                            <div class="stat-card-label">In Progress</div>
                        </div>
                        <div class="stat-card-icon primary">
                            <i class="ph ph-spinner"></i>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-value" id="fixedReports">0</div>
                            <div class="stat-card-label">Resolved</div>
                        </div>
                        <div class="stat-card-icon success">
                            <i class="ph ph-check-circle"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Reports -->
            <div class="content-card">
                <div class="card-header">
                    <h2 class="card-title">Recent Reports</h2>
                    <div class="card-actions">
                        <button class="btn btn-primary" id="newReportBtn">
                            <i class="ph ph-plus"></i>
                            New Report
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="filter-bar mb-3">
                        <input type="text" class="form-input search-input" id="searchInput" placeholder="Search reports...">
                        <select class="form-select filter-select" id="statusFilter">
                            <option value="">All Statuses</option>
                            <option value="Pending">Pending</option>
                            <option value="Under Review">Under Review</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Fixed">Fixed</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                        <select class="form-select filter-select" id="categoryFilter">
                            <option value="">All Categories</option>
                            <option value="Roads">Roads</option>
                            <option value="Garbage">Garbage</option>
                            <option value="Drainage">Drainage</option>
                            <option value="Flooding">Flooding</option>
                            <option value="Street Lights">Street Lights</option>
                            <option value="Public Safety">Public Safety</option>
                            <option value="Infrastructure">Infrastructure</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div class="report-list" id="reportList">
                        <!-- Reports will be loaded here -->
                        <div class="empty-state">
                            <i class="ph ph-spinner empty-state-icon" style="animation: spin 1s linear infinite;"></i>
                            <p class="empty-state-text">Loading reports...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- New Report Modal -->
    <div class="modal-overlay" id="newReportModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Create New Report</h3>
                <button class="modal-close" id="closeNewReportModal">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="newReportForm">
                    <div class="form-group">
                        <label class="form-label">Issue Photo *</label>
                        <div class="image-upload" id="imageUpload">
                            <input type="file" id="imageInput" accept="image/*" hidden>
                            <div id="uploadPlaceholder">
                                <i class="ph ph-camera image-upload-icon"></i>
                                <p class="image-upload-text">Click to upload photo</p>
                                <p class="image-upload-hint">PNG, JPG up to 5MB</p>
                            </div>
                            <img id="imagePreview" class="image-upload-preview hidden" alt="Preview">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="reportTitle" class="form-label">Title *</label>
                        <input type="text" id="reportTitle" class="form-input" placeholder="Brief description of the issue" required>
                    </div>

                    <div class="form-group">
                        <label for="reportDescription" class="form-label">Description *</label>
                        <textarea id="reportDescription" class="form-textarea" placeholder="Provide detailed information about the issue..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="reportCategory" class="form-label">Category *</label>
                        <select id="reportCategory" class="form-select" required>
                            <option value="">Select category</option>
                            <option value="Roads">Roads</option>
                            <option value="Garbage">Garbage</option>
                            <option value="Drainage">Drainage</option>
                            <option value="Flooding">Flooding</option>
                            <option value="Street Lights">Street Lights</option>
                            <option value="Public Safety">Public Safety</option>
                            <option value="Infrastructure">Infrastructure</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reportSeverity" class="form-label">Severity *</label>
                        <select id="reportSeverity" class="form-select" required>
                            <option value="">Select severity</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Emergency">Emergency</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reportLocation" class="form-label">Location *</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="reportLocation" class="form-input" placeholder="Enter location or use GPS" required>
                            <button type="button" class="btn btn-outline" id="gpsBtn" title="Use my location">
                                <i class="ph ph-crosshair"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelNewReport">Cancel</button>
                <button class="btn btn-primary" id="submitReport">
                    Submit Report
                </button>
            </div>
        </div>
    </div>

    <!-- Report Detail Modal -->
    <div class="modal-overlay" id="reportDetailModal">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h3 class="modal-title">Report Details</h3>
                <button class="modal-close" id="closeReportDetailModal">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            <div class="modal-body" id="reportDetailContent">
                <!-- Report details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
